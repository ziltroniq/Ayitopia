<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYITOPIA – Arène de Quiz Compétitive Haïtienne</title>
  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <style>
    /* Minimal cleaned styles (kept compact to avoid accidental truncation) */
    :root{--bg:#08080f;--card:#141420;--blue:#00d4ff;--muted:#6a6a82;--text:#eaeaef}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui}
    #app-root{height:100%;padding:16px}
    .screen{display:none;height:100%}
    .screen.active{display:block}
    .logo-pulse{font-weight:900;font-size:40px;background:linear-gradient(135deg,var(--blue),#b44dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .auth-container{max-width:420px;margin:24px auto;background:var(--card);padding:20px;border-radius:12px}
    .btn{padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer}
    .btn-primaire{background:linear-gradient(135deg,var(--blue),#0099cc);color:#000}
    .categorie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
    .recompense-card{background:var(--card);padding:12px;border-radius:12px;margin-bottom:10px}
  </style>
</head>
<body>
<div id="app-root">
  <div id="ecran-chargement" class="screen active">
    <div style="text-align:center;">
      <div class="logo-pulse">AYITOPIA</div>
      <div style="color:var(--muted);margin-top:12px">Connexion à l'arène…</div>
    </div>
  </div>

  <div id="ecran-auth" class="screen">
    <div class="auth-container">
      <h3 style="text-align:center">Connexion</h3>
      <form id="form-connexion">
        <div style="margin-bottom:8px"><label>Email</label><input id="login-email" type="email" style="width:100%;padding:8px;border-radius:6px;background:#0f0f18;border:1px solid #1e1e30;color:var(--text)"></div>
        <div style="margin-bottom:8px"><label>Mot de passe</label><input id="login-password" type="password" style="width:100%;padding:8px;border-radius:6px;background:#0f0f18;border:1px solid #1e1e30;color:var(--text)"></div>
        <button type="submit" class="btn btn-primaire" style="width:100%">🔓 Se connecter</button>
        <div id="auth-erreur" style="color:#ff2d4b;margin-top:8px;text-align:center"></div>
      </form>
    </div>
  </div>

  <div id="ecran-lobby" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-weight:900">⚔️ AYITOPIA</div>
      <button class="btn" onclick="afficherEcran('ecran-profil')">👤 Profil</button>
    </div>
    <div id="lobby-contenu-onglet"></div>
  </div>

  <div id="ecran-recompenses" class="screen">
    <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-weight:700">🎁 Récompenses</div>
      <button class="btn" onclick="afficherEcran('ecran-lobby')">← Retour</button>
    </div>
    <div id="liste-recompenses"></div>
  </div>

  <div id="ecran-profil" class="screen">
    <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-weight:700">👤 Mon Profil</div>
      <button class="btn" onclick="afficherEcran('ecran-lobby')">← Retour</button>
    </div>
    <div style="text-align:center">👤<div id="profil-pseudo">Joueur</div></div>
  </div>
</div>

<div class="toast-conteneur" id="toast-conteneur"></div>

<script>
  // Cleaned script: fixes the broken reward block and ensures no syntax errors
  const CONFIG_FIREBASE = {
    apiKey: "AIzaSyB_RlBCLdowQeeEQ-jOsmXbHMlTGsPXrBI",
    authDomain: "ayitopia.firebaseapp.com",
    projectId: "ayitopia",
    storageBucket: "ayitopia.firebasestorage.app",
    messagingSenderId: "661006183462",
    appId: "1:661006183462:web:d09654999365d1d7640ae7",
    measurementId: "G-FXJX9C501N"
  };

  let auth=null, db=null, storage=null, utilisateurActuel=null, donneesUtilisateur=null;

  function initialiserFirebase(){
    try{
      firebase.initializeApp(CONFIG_FIREBASE);
      auth = firebase.auth(); db = firebase.firestore(); storage = firebase.storage();
      return true;
    }catch(e){console.error('Firebase init error',e);return false}
  }

  function afficherEcran(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));const el=document.getElementById(id);if(el)el.classList.add('active');}

  function afficherToast(msg, type='info'){const c=document.getElementById('toast-conteneur');const t=document.createElement('div');t.textContent=msg;t.style.padding='8px 12px';t.style.background='#222';t.style.borderRadius='8px';c.appendChild(t);setTimeout(()=>t.remove(),3000)}

  // Render rewards (fixed function) — replace previous broken fragment
  function renderRecompenses(){
    const recompenses = [
      {icone:'🏅', nom:'Pack Bronze', desc:'Top 50 mensuel', cond:'Top 50'},
      {icone:'🥈', nom:'Pack Argent', desc:'Top 20 mensuel', cond:'Top 20'},
      {icone:'🥇', nom:'Pack Or', desc:'Top 5 mensuel', cond:'Top 5'},
      {icone:'🎁', nom:'Pack Premium (Cash)', desc:'Top 1 mensuel', cond:'Top 1'}
    ];
    const html = recompenses.map(r=>`
      <div class="recompense-card">
        <div style="font-size:28px">${r.icone}</div>
        <div>
          <div style="font-weight:800">${r.nom}</div>
          <div style="color:var(--muted);font-size:13px">${r.desc}</div>
        </div>
        <div style="font-weight:700;margin-top:8px">🔒 ${r.cond}</div>
      </div>
    `).join('');
    const container = document.getElementById('liste-recompenses');
    if(container) container.innerHTML = html;
  }

  function renderMiniRecompenses(){ renderRecompenses(); }

  // Basic auth wiring (keeps app usable and avoids remaining errors)
  function configurerAuth(){
    const form = document.getElementById('form-connexion');
    if(!form) return;
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const pwd = document.getElementById('login-password').value;
      if(!email||!pwd) return document.getElementById('auth-erreur').textContent='Email et mot de passe requis';
      try{ await auth.signInWithEmailAndPassword(email,pwd); afficherToast('✅ Connecté','succes'); }
      catch(err){ document.getElementById('auth-erreur').textContent = err.message || 'Erreur de connexion' }
    });

    auth.onAuthStateChanged(async (user)=>{
      if(user){ utilisateurActuel = user; afficherEcran('ecran-lobby'); renderRecompenses(); }
      else{ utilisateurActuel = null; afficherEcran('ecran-auth'); }
    });
  }

  // Minimal image resize helper (used elsewhere in original code)
  function redimensionnerImage(file, maxW, maxH){
    return new Promise((resolve,reject)=>{
      const img = new Image();
      const reader = new FileReader();
      reader.onload = function(ev){ img.src = ev.target.result; };
      reader.onerror = reject;
      img.onload = function(){
        const canvas = document.createElement('canvas');
        const ratio = Math.min(maxW/img.width, maxH/img.height, 1);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.85));
      };
      reader.readAsDataURL(file);
    });
  }

  window.onload = ()=>{
    const ok = initialiserFirebase();
    if(ok) configurerAuth();
    else document.getElementById('ecran-chargement').innerHTML = '<div style="color:#ff2d4b;padding:20px;text-align:center">Erreur critique : Impossible de se connecter aux serveurs.</div>';
    // show rewards in lobby for now
    renderRecompenses();
  };
</script>
</body>
</html>
